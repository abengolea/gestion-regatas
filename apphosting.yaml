# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure
# Proyecto Firebase: regatasadmin-3c6ee | Backend: gestion-regatas

runConfig:
  maxInstances: 1

# Variables de entorno para staging y producción.
# La API key se inyecta desde Secret Manager (no se sube al repo).
# Crear el secret: firebase apphosting:secrets:set firebase-api-key
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: firebase-api-key
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: regatasadmin-3c6ee.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: regatasadmin-3c6ee
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: regatasadmin-3c6ee.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "504691770185"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:504691770185:web:cb87f2964c9c24e58e1098"
    availability:
      - BUILD
      - RUNTIME
  # URL base de la app en producción
  - variable: NEXT_PUBLIC_APP_URL
    value: "https://gestion-regatas--regatasadmin-3c6ee.us-east4.hosted.app"
    availability:
      - BUILD
      - RUNTIME
  # Mercado Pago (cuando lo actives en Regatas): MERCADOPAGO_CLIENT_ID + secrets
  # mercadopago-client-secret y mercadopago-platform-access-token vía
  # firebase apphosting:secrets:set … y grantaccess al backend gestion-regatas.
